<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- Mobile optimization -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- App title -->
  <title>Random Video Chat</title>

  <!-- Description -->
  <meta name="description" content="Talk with random strangers instantly using WebRTC video chat." />

  <!-- Theme color for mobile browsers -->
  <meta name="theme-color" content="#0f0f0f" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />

  <!-- Performance optimizations -->
  <link rel="preconnect" href="https://socket-mern-1.onrender.com">
  <link rel="dns-prefetch" href="https://socket-mern-1.onrender.com">

  <!-- Preconnect STUN/TURN servers -->
  <link rel="preconnect" href="https://stun.l.google.com">
  <link rel="preconnect" href="https://openrelay.metered.ca">

  <!-- Google Fonts: Outfit + Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Open Graph (for sharing links) -->
  <meta property="og:title" content="Random Video Chat">
  <meta property="og:description" content="Meet strangers instantly using WebRTC.">
  <meta property="og:type" content="website">

  <!-- Prevent zoom on mobile (better video UX) -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <!-- Prevent caching issues -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />

</head>

<body>

  <!-- Root for React -->
  <div id="root"></div>

  <!-- React entry -->
  <script type="module" src="/src/main.jsx"></script>

</body>


</html>
